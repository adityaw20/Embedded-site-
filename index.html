<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/fabfdf08cb.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>Aditya DevKit</title>
</head>

<body>

<header>
    <h1>Aditya DevKit ⚡</h1>
    <i class="fa-solid fa-moon theme-toggle" id="themeIcon"></i>
</header>

<!-- ================= CONVERTERS ================= -->

<div class="section">
<h3>🔁 Advanced Converters</h3>
<div class="tools-grid">

<div class="tool-card">
<h4>IEEE754 Breakdown (Float32)</h4>
<input type="number" id="floatBreakInput" placeholder="Enter Decimal">
<button id="floatBreakBtn">Breakdown</button>
<div class="result-box" id="floatBreakResult"></div>
</div>

<div class="tool-card">
<h4>Voltage ↔ ADC Converter</h4>
<input type="number" id="voltageInput" placeholder="Voltage">
<input type="number" id="adcRef" placeholder="Reference Voltage">
<input type="number" id="adcRes" placeholder="Resolution (bits)">
<button id="adcBtn">Convert</button>
<div class="result-box" id="adcResult"></div>
</div>

<div class="tool-card">
<h4>dB ↔ Gain Converter</h4>
<input type="number" id="dbInput" placeholder="dB">
<button id="dbBtn">Convert</button>
<div class="result-box" id="dbResult"></div>
</div>

<div class="tool-card">
<h4>CAN ID Formatter</h4>
<input type="number" id="canInput" placeholder="Decimal CAN ID">
<button id="canBtn">Format</button>
<div class="result-box" id="canResult"></div>
</div>

<div class="tool-card">
<h4>Register Bit Visualizer</h4>
<input type="text" id="bitInput" placeholder="HEX Value">
<button id="bitBtn">Visualize</button>
<div class="result-box" id="bitResult"></div>
</div>

<div class="tool-card">
<h4>Packet Builder / Decoder</h4>
<input type="text" id="packetInput" placeholder="HEX Bytes">
<button id="packetBtn">Decode</button>
<div class="result-box" id="packetResult"></div>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
